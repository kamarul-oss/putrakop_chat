name: Build & Package for Deployment

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      COMPOSER_ALLOW_SUPERUSER: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ─── PHP Setup ──────────────────────────────────────
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, json, bcmath, gd, pdo, pdo_mysql
          coverage: none

      - name: Create required directories
        run: |
          mkdir -p bootstrap/cache
          mkdir -p storage/framework/cache/data
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          mkdir -p storage/logs
          mkdir -p storage/app/public
          chmod -R 775 bootstrap/cache storage

      - name: Install Composer Dependencies
        run: |
          composer config policy.advisories.block false
          composer install --no-dev --optimize-autoloader --no-interaction --ignore-platform-reqs 2>&1 || {
            echo "--- Composer install failed, trying with --no-scripts ---"
            composer install --no-dev --optimize-autoloader --no-interaction --ignore-platform-reqs --no-scripts 2>&1
          }

      # ─── Node.js Setup ──────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install NPM Dependencies
        run: npm install

      - name: Build Frontend Assets
        run: npm run build

      # ─── Package Everything ─────────────────────────────
      - name: Create deployment ZIP
        run: |
          # Create clean deploy directory
          rm -rf deploy
          mkdir -p deploy
          
          # Copy all project files (exclude dev/CI stuff)
          rsync -av \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='deploy' \
            --exclude='tests' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='vite.config.js' \
            --exclude='postcss.config.js' \
            --exclude='tailwind.config.js' \
            --exclude='putrakop_live_chat.zip' \
            --exclude='*.md' \
            . deploy/
          
          # Ensure storage directories exist
          mkdir -p deploy/storage/app/public
          mkdir -p deploy/storage/framework/cache/data
          mkdir -p deploy/storage/framework/sessions
          mkdir -p deploy/storage/framework/views
          mkdir -p deploy/storage/logs
          mkdir -p deploy/bootstrap/cache
          
          # Add .gitkeep files
          touch deploy/storage/app/.gitkeep
          touch deploy/storage/app/public/.gitkeep
          touch deploy/storage/framework/cache/data/.gitkeep
          touch deploy/storage/framework/sessions/.gitkeep
          touch deploy/storage/framework/views/.gitkeep
          touch deploy/storage/logs/.gitkeep
          touch deploy/bootstrap/cache/.gitkeep
          
          # Make storage writable
          chmod -R 775 deploy/storage
          chmod -R 775 deploy/bootstrap/cache
          
          # Create ZIP
          cd deploy
          zip -r ../putrakop-livechat-deploy.zip .
          cd ..
          
          echo "ZIP created successfully"
          ls -lh putrakop-livechat-deploy.zip

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: putrakop-livechat-deploy
          path: putrakop-livechat-deploy.zip
          retention-days: 7
          if-no-files-found: error
